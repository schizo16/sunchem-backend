services:
  - type: web
    name: sunchem-backend
    env: go
    buildCommand: go build -o server .
    startCommand: ./server
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_TYPE
        value: sqlite
      - key: DB_DSN
        value: /var/data/sunchem.db
      - key: APP_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
