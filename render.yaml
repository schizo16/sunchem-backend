services:
  - type: web
    name: sunchem-backend
    env: go
    buildCommand: go build -o server .
    startCommand: ./server
    healthCheckPath: /api/v1/settings/general
    envVars:
      - key: PORT
        value: "8080"
      - key: SERVER_PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_TYPE
        value: sqlite
      - key: DB_DSN
        value: /var/data/sunchem.db
      - key: APP_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: GENORACT_CLIENT_ID
        sync: false
      - key: GENORACT_CLIENT_SECRET
        sync: false
      - key: OIDC_AUTHORITY
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_REDIRECT_URI
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
